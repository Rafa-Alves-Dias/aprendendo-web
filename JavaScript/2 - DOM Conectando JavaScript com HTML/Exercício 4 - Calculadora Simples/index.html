<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Calculadora</title>
</head>
<body>
    <h1>Calculadora</h1>
    
    <label>primeiro número:</label><br>
    <input type="number" placeholder="Ex: 5" id="num1"><br>
    <label>segundo número:</label><br>
    <input type="number" placeholder="Ex: 3" id="num2"><br>
    <button id="btnAdd">+</button>
    <button id="btnSub">-</button>
    <button id="btnMult">*</button>
    <button id="btnDiv">/</button>
    <p id="resultado"></p>
    <script src="calculadora.js"></script>
</body>
</html>
