<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Empresas de jogos</title>
    <!-- fonte SN Pro-->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&family=SN+Pro:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
</head>
<body class="tema-padrao">
    <h1 id="titulo" id="texto" class="padrao">Empresas</h1>

    <div id="capaEmpresas" class="img-padrao">

        <img src="imagens/capa.png" alt="capa padrão" class="capa-padrao">

        <img src="imagens/logos/capcom.png" alt="Capcom logo" class="capa-capcom">
        <img src="imagens/logos/sega.png" alt="Sega logo" class="capa-sega">
        <img src="imagens/logos/ubisoft.png" alt="Ubisoft logo" class="capa-ubisoft">
    </div>
    <div id="botoes">
        <button id="btnHome" class="remove">Home</button>
        <button id="btnCapcom" class="padrao">Capcom</button>
        <button id="btnSega" class="padrao">Sega</button>
        <button id="btnUbisoft" class="padrao">Ubisoft</button>
    </div>

    <h1 id="jogos" id="texto" class="padrao">Ultimos lançamentos</h1>
    <div id="imgJogos">
        <div class="empresas-banner">
            <img src="imagens/empresas/epic_games.png" alt="epic games" id="emp-epic-games">
            <img src="imagens/empresas/nintendo.jpg" alt="nintendo" id="emp-nintendo">
            <img src="imagens/empresas/playstation.webp" alt="playstation" id="emp-playstation">
            <img src="imagens/empresas/steam.jpg" alt="steam" id="emp-steam">
            <img src="imagens/empresas/xbox.jpg" alt="xbox" id="emp-xbox">
        </div>
        <div class="jogos-capcom" class="remove">
            <img src="imagens/capcom_jogos/Kunitsu_Gami_Path_of_the_Goddess.png" alt="Kunitsu Gami: Path of the Goddess" id="kunitsu-gami">
            <img src="imagens/capcom_jogos/Monster_Hunter_Stories_3_Twisted_Reflection.jpg" alt=" Monster Hunter Stories 3: Twisted Reflection" id="mh-stories-3">
            <img src="imagens/capcom_jogos/Monster_Hunter_Wilds.jpg" alt="Monster Hunter: Wilds" id="mh-wilds">
            <img src="imagens/capcom_jogos/Pragmata.jpg" alt="Pragmata" id="pragmata">
            <img src="imagens/capcom_jogos/Resident_Evil_Requiem.jpg" alt="Resident Evil Requiem" id="residentEvil">
        </div>
        <div class="jogos-sega" class="remove">
            <img src="imagens/sega_jogos/Football_Manager_26.webp" alt="Football Manager 26" id="footballManager26">
            <img src="imagens/sega_jogos/Like_a_Dragon_Pirate_Yakuza_in_Hawai.jpg" alt="Like a Dragon: Pirate Yakuza in Hawai" id="likeADragon">
            <img src="imagens/sega_jogos/Sonic_Racing_Crossworlds.webp" alt="Sonic Racing CrossWorlds" id="sonicRacing">
            <img src="imagens/sega_jogos/Sonic_Rumble_Party.jpg" alt="Sonic Rumble Party" id="sonicRumble">
            <img src="imagens/sega_jogos/Yakuza_Kiwami_3_e_Dark_Tides.webp" alt="Yakuza Kiwami 3 & Dark Ties" id="yakuzaKiwami3">
        </div>
        <div class="jogos-ubisoft" class="remove">
            <img src="imagens/ubisoft_jogos/Anno_117_Pax_Romana.jpg" alt="Anno 117: Pax Romana" id="anno117">
            <img src="imagens/ubisoft_jogos/Assassins_Creed_Shadows.jpg" alt="Assassin's Creed Shadows" id="assassinsCreed">
            <img src="imagens/ubisoft_jogos/The_Rogue_Prince_of_Persia.jpg" alt="The Rogue Prince of Persia" id="princeOfPersia">
            <img src="imagens/ubisoft_jogos/Tom_Clancys_The_Division_Resurgence.jpg" alt="Tom Clancy's The Division Resurgence" id="theDivision">
            <img src="imagens/ubisoft_jogos/XDefiant.jpg" alt="XDefiant" id="xDefiant">
        </div>
    </div>
    <div></div>

    <script src="empresas.js"></script>
</body>
</html>
